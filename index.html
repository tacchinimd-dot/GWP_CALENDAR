<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ST 에코백 사은품 진행 상황</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; background: #f0f2f5; color: #333; }

  /* Login overlay */
  .login-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    z-index: 9999; display: flex; justify-content: center; align-items: center;
  }
  .login-overlay.hidden { display: none; }
  .login-box {
    background: #fff; border-radius: 16px; padding: 40px; width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center;
  }
  .login-box h2 { color: #1a1a2e; margin-bottom: 8px; font-size: 22px; }
  .login-box .subtitle { color: #888; font-size: 13px; margin-bottom: 28px; }
  .login-box input {
    width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 10px;
    font-size: 15px; margin-bottom: 16px; transition: border 0.2s;
  }
  .login-box input:focus { outline: none; border-color: #3a86ff; }
  .login-box button {
    width: 100%; padding: 12px; background: #3a86ff; color: #fff; border: none;
    border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.2s;
  }
  .login-box button:hover { background: #2a6fdf; }
  .login-box .info { margin-top: 16px; font-size: 11px; color: #aaa; }

  /* Top bar */
  .top-bar {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    color: #fff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .top-bar h1 { font-size: 20px; letter-spacing: -0.5px; }
  .top-bar .user-info { display: flex; align-items: center; gap: 12px; font-size: 13px; }
  .top-bar .user-badge {
    background: rgba(255,255,255,0.15); padding: 6px 14px; border-radius: 20px;
    display: flex; align-items: center; gap: 6px;
  }
  .top-bar .user-dot { width: 8px; height: 8px; border-radius: 50%; background: #2ecc71; }
  .top-bar .logout-btn {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    color: #fff; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px;
  }
  .top-bar .logout-btn:hover { background: rgba(255,255,255,0.2); }
  .top-bar .refresh-btn {
    background: rgba(58,134,255,0.3); border: 1px solid rgba(58,134,255,0.5);
    color: #fff; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px;
  }
  .top-bar .refresh-btn:hover { background: rgba(58,134,255,0.5); }

  /* Layout */
  .container { display: flex; gap: 20px; padding: 20px; max-width: 1600px; margin: 0 auto; }
  .left-panel { flex: 1; display: flex; flex-direction: column; gap: 20px; min-width: 0; }
  .right-panel { width: 420px; flex-shrink: 0; display: flex; flex-direction: column; gap: 16px; }

  /* Calendar */
  .calendar { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow: hidden; }
  .cal-header {
    background: linear-gradient(135deg, #3a86ff, #5a9cff);
    color: #fff; padding: 14px 20px; font-size: 17px; font-weight: 700;
  }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .day-name { text-align: center; font-weight: 700; font-size: 12px; padding: 10px 0; background: #f8f9fb; color: #666; border-bottom: 1px solid #eee; }
  .day-name.sun { color: #e74c3c; }
  .day-name.sat { color: #3498db; }

  .day-cell {
    min-height: 88px; border: 1px solid #f0f0f0; padding: 4px 5px;
    cursor: pointer; transition: background 0.15s; position: relative;
  }
  .day-cell:hover { background: #f0f7ff; }
  .day-cell.empty { background: #fafafa; cursor: default; }
  .day-cell.empty:hover { background: #fafafa; }
  .day-cell.today { background: #fffde7; border-color: #ffd600; }
  .day-cell .day-num { font-size: 12px; font-weight: 700; margin-bottom: 2px; }
  .day-cell.sun .day-num { color: #e74c3c; }
  .day-cell.sat .day-num { color: #3498db; }

  .note-item {
    background: #e8f4fd; border-radius: 3px; padding: 2px 4px; margin-bottom: 2px;
    font-size: 10px; display: flex; align-items: center; gap: 3px; line-height: 1.3;
  }
  .note-item.has-dates { background: #e8f8e8; }
  .note-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .note-author { color: #999; font-size: 9px; flex-shrink: 0; }
  .del-note { cursor: pointer; color: #bbb; font-size: 9px; flex-shrink: 0; }
  .del-note:hover { color: #e74c3c; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.45); z-index: 2000; justify-content: center; align-items: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #fff; border-radius: 14px; padding: 28px; width: 420px; max-width: 92vw;
    box-shadow: 0 12px 40px rgba(0,0,0,0.25);
  }
  .modal h3 { margin-bottom: 20px; color: #1a1a2e; font-size: 17px; }
  .modal label { font-size: 12px; font-weight: 600; color: #666; display: block; margin-bottom: 4px; margin-top: 14px; }
  .modal input[type="text"], .modal input[type="date"] {
    width: 100%; padding: 10px 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px;
  }
  .modal input:focus { outline: none; border-color: #3a86ff; box-shadow: 0 0 0 3px rgba(58,134,255,0.1); }
  .modal .btn-row { display: flex; gap: 8px; margin-top: 22px; justify-content: flex-end; }
  .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 600; transition: all 0.15s; }
  .btn-primary { background: #3a86ff; color: #fff; }
  .btn-primary:hover { background: #2a6fdf; }
  .btn-cancel { background: #f0f0f0; color: #666; }
  .btn-cancel:hover { background: #e0e0e0; }

  /* Right panels */
  .panel-section { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow: hidden; }
  .panel-header {
    padding: 13px 18px; font-size: 15px; font-weight: 700; color: #fff;
    display: flex; justify-content: space-between; align-items: center;
  }
  .panel-header.current { background: linear-gradient(135deg, #2ecc71, #27ae60); }
  .panel-header.upcoming { background: linear-gradient(135deg, #e67e22, #d35400); }
  .panel-header.activity { background: linear-gradient(135deg, #8e44ad, #7d3c98); }
  .panel-header .add-btn {
    background: rgba(255,255,255,0.25); border: none; color: #fff;
    width: 26px; height: 26px; border-radius: 50%; font-size: 17px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .panel-header .add-btn:hover { background: rgba(255,255,255,0.4); }

  .task-list { padding: 6px 10px; max-height: 260px; overflow-y: auto; }
  .task-item { display: flex; align-items: flex-start; gap: 8px; padding: 9px 6px; border-bottom: 1px solid #f5f5f5; }
  .task-item:last-child { border-bottom: none; }
  .task-check { margin-top: 3px; cursor: pointer; accent-color: #3a86ff; width: 15px; height: 15px; }
  .task-content { flex: 1; min-width: 0; }
  .task-title { font-size: 13px; font-weight: 600; }
  .task-item.done .task-title { text-decoration: line-through; color: #aaa; }
  .task-dates { font-size: 10px; color: #999; margin-top: 2px; }
  .task-author { font-size: 10px; color: #3a86ff; margin-top: 1px; }
  .task-del { cursor: pointer; color: #ddd; font-size: 15px; padding: 0 4px; }
  .task-del:hover { color: #e74c3c; }
  .empty-msg { text-align: center; padding: 20px; color: #bbb; font-size: 12px; }

  /* Activity log */
  .activity-list { padding: 6px 10px; max-height: 220px; overflow-y: auto; }
  .activity-item { padding: 7px 6px; border-bottom: 1px solid #f5f5f5; font-size: 12px; }
  .activity-item:last-child { border-bottom: none; }
  .activity-meta { color: #999; font-size: 10px; margin-top: 2px; }
  .activity-author { color: #8e44ad; font-weight: 600; }

  /* Auto-refresh indicator */
  .refresh-indicator {
    position: fixed; bottom: 16px; right: 16px; background: rgba(0,0,0,0.7);
    color: #fff; padding: 6px 12px; border-radius: 20px; font-size: 11px;
    opacity: 0; transition: opacity 0.3s; z-index: 100;
  }
  .refresh-indicator.show { opacity: 1; }

  @media (max-width: 1100px) {
    .container { flex-direction: column; }
    .right-panel { width: 100%; }
  }
</style>
</head>
<body>

<!-- Login Screen -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>ST 에코백 사은품 진행 상황</h2>
    <p class="subtitle">캘린더에 접속하려면 담당자명을 입력해주세요.</p>
    <input type="text" id="loginName" placeholder="이름 (예: 홍길동)" autofocus>
    <button onclick="doLogin()">접속하기</button>
    <p class="info">입력하신 이름은 작성 내역 추적에 사용됩니다.</p>
  </div>
</div>

<!-- Top Bar -->
<div class="top-bar" id="topBar" style="display:none;">
  <h1>ST 에코백 사은품 진행 상황</h1>
  <div class="user-info">
    <button class="refresh-btn" onclick="refreshAll()">새로고침</button>
    <div class="user-badge">
      <span class="user-dot"></span>
      <span id="currentUserName">-</span>
    </div>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>
</div>

<!-- Main Content -->
<div class="container" id="mainContent" style="display:none;">
  <div class="left-panel">
    <div class="calendar" id="cal-april"></div>
    <div class="calendar" id="cal-may"></div>
  </div>

  <div class="right-panel">
    <div class="panel-section">
      <div class="panel-header current">
        현재 진행 상황
        <button class="add-btn" onclick="openTaskModal('current')" title="항목 추가">+</button>
      </div>
      <div class="task-list" id="current-tasks"></div>
    </div>
    <div class="panel-section">
      <div class="panel-header upcoming">
        앞으로 진행할 항목
        <button class="add-btn" onclick="openTaskModal('upcoming')" title="항목 추가">+</button>
      </div>
      <div class="task-list" id="upcoming-tasks"></div>
    </div>
    <div class="panel-section">
      <div class="panel-header activity">최근 활동 내역</div>
      <div class="activity-list" id="activity-log"></div>
    </div>
  </div>
</div>

<!-- Day Note Modal -->
<div class="modal-overlay" id="dayModal">
  <div class="modal">
    <h3 id="dayModalTitle">메모 추가</h3>
    <label>내용</label>
    <input type="text" id="noteText" placeholder="일정 또는 메모 입력">
    <label>시작일 (선택)</label>
    <input type="date" id="noteStart">
    <label>완료일 (선택)</label>
    <input type="date" id="noteEnd">
    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeDayModal()">취소</button>
      <button class="btn btn-primary" onclick="saveNote()">저장</button>
    </div>
  </div>
</div>

<!-- Task Modal -->
<div class="modal-overlay" id="taskModal">
  <div class="modal">
    <h3 id="taskModalTitle">항목 추가</h3>
    <label>제목</label>
    <input type="text" id="taskText" placeholder="항목 제목 입력">
    <label>시작일 (선택)</label>
    <input type="date" id="taskStart">
    <label>완료일 (선택)</label>
    <input type="date" id="taskEnd">
    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeTaskModal()">취소</button>
      <button class="btn btn-primary" onclick="saveTask()">저장</button>
    </div>
  </div>
</div>

<!-- Refresh indicator -->
<div class="refresh-indicator" id="refreshIndicator">동기화 완료</div>

<script>
// --- State ---
let currentUser = { userId: null, name: null };
let calData = { notes: {}, current: [], upcoming: [] };
let autoRefreshTimer = null;

// --- API helpers ---
async function api(method, url, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  return res.json();
}

// --- Login ---
async function checkExistingUser() {
  const saved = localStorage.getItem('ecobag_user');
  if (saved) {
    const parsed = JSON.parse(saved);
    // Verify with server
    const me = await api('GET', '/api/me');
    if (me.userId && me.name) {
      currentUser = me;
      showApp();
      return;
    }
    // Re-register with saved name
    const result = await api('POST', '/api/register', { name: parsed.name });
    currentUser = result;
    localStorage.setItem('ecobag_user', JSON.stringify(result));
    showApp();
    return;
  }
  document.getElementById('loginOverlay').classList.remove('hidden');
}

async function doLogin() {
  const name = document.getElementById('loginName').value.trim();
  if (!name) { document.getElementById('loginName').focus(); return; }

  const result = await api('POST', '/api/register', { name });
  currentUser = result;
  localStorage.setItem('ecobag_user', JSON.stringify(result));
  showApp();
}

function doLogout() {
  localStorage.removeItem('ecobag_user');
  currentUser = { userId: null, name: null };
  clearInterval(autoRefreshTimer);
  document.getElementById('topBar').style.display = 'none';
  document.getElementById('mainContent').style.display = 'none';
  document.getElementById('loginOverlay').classList.remove('hidden');
  document.getElementById('loginName').value = '';
}

function showApp() {
  document.getElementById('loginOverlay').classList.add('hidden');
  document.getElementById('topBar').style.display = 'flex';
  document.getElementById('mainContent').style.display = 'flex';
  document.getElementById('currentUserName').textContent = currentUser.name;
  refreshAll();
  // Auto refresh every 15 seconds
  clearInterval(autoRefreshTimer);
  autoRefreshTimer = setInterval(refreshAll, 15000);
}

// --- Data loading ---
async function refreshAll() {
  try {
    calData = await api('GET', '/api/data');
    renderCalendar('cal-april', 2026, 3, '4월');
    renderCalendar('cal-may', 2026, 4, '5월');
    renderTasks();
    loadActivity();
    showRefreshIndicator();
  } catch (e) {
    console.error('Refresh error:', e);
  }
}

function showRefreshIndicator() {
  const el = document.getElementById('refreshIndicator');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1500);
}

// --- Calendar rendering ---
function renderCalendar(containerId, year, month, monthName) {
  const container = document.getElementById(containerId);
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date();
  const isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;

  let html = `<div class="cal-header">${year}년 ${monthName}</div>`;
  html += '<div class="cal-grid">';

  ['일','월','화','수','목','금','토'].forEach((d, i) => {
    html += `<div class="day-name ${i===0?'sun':i===6?'sat':''}">${d}</div>`;
  });

  for (let i = 0; i < firstDay; i++) html += '<div class="day-cell empty"></div>';

  for (let d = 1; d <= daysInMonth; d++) {
    const dow = (firstDay + d - 1) % 7;
    const cls = dow === 0 ? 'sun' : dow === 6 ? 'sat' : '';
    const todayCls = isCurrentMonth && today.getDate() === d ? 'today' : '';
    const key = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const notes = calData.notes[key] || [];

    let notesHtml = notes.map((n, idx) => {
      const hasDates = n.start || n.end;
      return `<div class="note-item ${hasDates ? 'has-dates' : ''}" title="${n.author}: ${n.text}${n.start ? ' (시작:'+n.start+')':''}${n.end ? ' (완료:'+n.end+')':''}">
        <span class="note-text">${n.text}</span>
        <span class="note-author">${n.author}</span>
        <span class="del-note" onclick="event.stopPropagation();deleteNote('${key}',${idx})">&#10005;</span>
      </div>`;
    }).join('');

    html += `<div class="day-cell ${cls} ${todayCls}" onclick="openDayModal('${key}','${monthName} ${d}일')">
      <div class="day-num">${d}</div>
      ${notesHtml}
    </div>`;
  }

  html += '</div>';
  container.innerHTML = html;
}

// --- Day note modal ---
let currentDayKey = '';
function openDayModal(key, title) {
  currentDayKey = key;
  document.getElementById('dayModalTitle').textContent = title + ' - 메모 추가';
  document.getElementById('noteText').value = '';
  document.getElementById('noteStart').value = '';
  document.getElementById('noteEnd').value = '';
  document.getElementById('dayModal').classList.add('active');
  setTimeout(() => document.getElementById('noteText').focus(), 100);
}
function closeDayModal() { document.getElementById('dayModal').classList.remove('active'); }

async function saveNote() {
  const text = document.getElementById('noteText').value.trim();
  if (!text) return;
  const start = document.getElementById('noteStart').value;
  const end = document.getElementById('noteEnd').value;

  const result = await api('POST', '/api/notes', {
    dayKey: currentDayKey, text, start, end,
    userId: currentUser.userId, userName: currentUser.name
  });
  calData.notes = result.notes;
  renderCalendar('cal-april', 2026, 3, '4월');
  renderCalendar('cal-may', 2026, 4, '5월');
  closeDayModal();
}

async function deleteNote(dayKey, idx) {
  const result = await api('DELETE', `/api/notes/${dayKey}/${idx}`);
  calData.notes = result.notes;
  renderCalendar('cal-april', 2026, 3, '4월');
  renderCalendar('cal-may', 2026, 4, '5월');
}

// --- Task panel ---
let currentTaskType = 'current';
function openTaskModal(type) {
  currentTaskType = type;
  document.getElementById('taskModalTitle').textContent = type === 'current' ? '진행 항목 추가' : '예정 항목 추가';
  document.getElementById('taskText').value = '';
  document.getElementById('taskStart').value = '';
  document.getElementById('taskEnd').value = '';
  document.getElementById('taskModal').classList.add('active');
  setTimeout(() => document.getElementById('taskText').focus(), 100);
}
function closeTaskModal() { document.getElementById('taskModal').classList.remove('active'); }

async function saveTask() {
  const text = document.getElementById('taskText').value.trim();
  if (!text) return;
  const start = document.getElementById('taskStart').value;
  const end = document.getElementById('taskEnd').value;

  const result = await api('POST', `/api/tasks/${currentTaskType}`, {
    text, start, end,
    userId: currentUser.userId, userName: currentUser.name
  });
  calData.current = result.current;
  calData.upcoming = result.upcoming;
  renderTasks();
  closeTaskModal();
}

async function toggleTask(type, id) {
  const result = await api('PATCH', `/api/tasks/${type}/${id}`);
  calData.current = result.current;
  calData.upcoming = result.upcoming;
  renderTasks();
}

async function deleteTask(type, id) {
  const result = await api('DELETE', `/api/tasks/${type}/${id}`);
  calData.current = result.current;
  calData.upcoming = result.upcoming;
  renderTasks();
}

function renderTasks() {
  ['current', 'upcoming'].forEach(type => {
    const container = document.getElementById(type + '-tasks');
    const items = calData[type] || [];
    if (items.length === 0) {
      container.innerHTML = '<div class="empty-msg">항목이 없습니다. + 버튼으로 추가하세요.</div>';
      return;
    }
    container.innerHTML = items.map(t => {
      let dateStr = '';
      if (t.start && t.end) dateStr = `${t.start} &rarr; ${t.end}`;
      else if (t.start) dateStr = `시작: ${t.start}`;
      else if (t.end) dateStr = `완료: ${t.end}`;
      return `<div class="task-item ${t.done ? 'done' : ''}">
        <input type="checkbox" class="task-check" ${t.done ? 'checked' : ''} onchange="toggleTask('${type}',${t.id})">
        <div class="task-content">
          <div class="task-title">${t.text}</div>
          ${dateStr ? `<div class="task-dates">${dateStr}</div>` : ''}
          <div class="task-author">${t.author || ''}</div>
        </div>
        <span class="task-del" onclick="deleteTask('${type}',${t.id})">&#10005;</span>
      </div>`;
    }).join('');
  });
}

// --- Activity log ---
async function loadActivity() {
  try {
    const activities = await api('GET', '/api/activity');
    const container = document.getElementById('activity-log');
    if (!activities.length) {
      container.innerHTML = '<div class="empty-msg">아직 활동 내역이 없습니다.</div>';
      return;
    }
    container.innerHTML = activities.map(a => {
      const time = a.createdAt ? new Date(a.createdAt).toLocaleString('ko-KR', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }) : '';
      const typeLabel = a.day ? `[${a.day}]` : `[${a.type}]`;
      return `<div class="activity-item">
        <span class="activity-author">${a.author}</span> ${typeLabel} ${a.text}
        <div class="activity-meta">${time}</div>
      </div>`;
    }).join('');
  } catch (e) {}
}

// --- Keyboard ---
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeDayModal(); closeTaskModal(); }
  if (e.key === 'Enter') {
    if (document.getElementById('loginOverlay').classList.contains('hidden') === false) { doLogin(); return; }
    if (document.getElementById('dayModal').classList.contains('active')) saveNote();
    else if (document.getElementById('taskModal').classList.contains('active')) saveTask();
  }
});
